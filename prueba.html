<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo AR - Menú del Motor</title>
    
    <!-- Inyección del motor de renderizado de Google -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #121212; 
            height: 100vh; 
        }
        /* El visor ocupará toda la pantalla del móvil */
        model-viewer { 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>

    <!-- Instancia del componente WebAR -->
    <model-viewer 
        src="Project_Name.glb" 
        alt="Interfaz flotante de telemetría"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1.5"
        shadow-softness="1"
        camera-orbit="0deg 75deg 2m">
        
        <!-- Botón personalizado para activar la cámara en móviles -->
        <button slot="ar-button" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; background-color: #ff3b30; color: white; border: none; font-weight: bold; font-family: sans-serif;">
            Activar Realidad Aumentada
        </button>
        
    </model-viewer>

</body>
</html>
